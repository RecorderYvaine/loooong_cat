name: MacOS Fuzz Test
on:
  push:
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Godot
        uses: chickensoft-games/setup-godot@v1
        with:
          version: 4.6.3
          use-dotnet: false
          
      - name: Verify Godot
        run: godot --version

      - name: Run Syntax Check
        run: godot --headless --path . --script tests/run_tests.gd

      - name: Run Fuzz Test
        run: godot --headless --path . --script tests/test_fuzzer.gd
