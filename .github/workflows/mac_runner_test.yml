name: MacOS Fuzz Test
on:
  push:
  workflow_dispatch:

jobs:
  test:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Godot
        run: brew install --cask godot
          
      - name: Verify Godot
        run: |
          command -v godot
          file "$(command -v godot)"
          godot --version

      - name: Run Syntax Check
        run: godot --headless --path . --script tests/run_tests.gd

      - name: Run Fuzz Test
        run: godot --headless --path . --script tests/test_fuzzer.gd
